openapi: 3.0.3
info:
  title: API Gestion Location Appartements
  version: v1
  description: API REST pour la gestion de locations d'appartements
paths:
  /api/appartements/:
    get:
      operationId: api_appartements_list
      description: ViewSet pour gérer les appartements
      parameters:
      - in: query
        name: disponible
        schema:
          type: boolean
      - in: query
        name: nb_pieces
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: proprietaire
        schema:
          type: string
          format: uuid
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: ville
        schema:
          type: string
      tags:
      - api
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAppartementListList'
          description: ''
    post:
      operationId: api_appartements_create
      description: ViewSet pour gérer les appartements
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppartementCreateUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AppartementCreateUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AppartementCreateUpdate'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppartementCreateUpdate'
          description: ''
  /api/appartements/{slug}/:
    get:
      operationId: api_appartements_retrieve
      description: Incrémente le compteur de vues à la consultation
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppartementDetail'
          description: ''
    put:
      operationId: api_appartements_update
      description: ViewSet pour gérer les appartements
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppartementCreateUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AppartementCreateUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AppartementCreateUpdate'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppartementCreateUpdate'
          description: ''
    patch:
      operationId: api_appartements_partial_update
      description: ViewSet pour gérer les appartements
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAppartementCreateUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAppartementCreateUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAppartementCreateUpdate'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppartementCreateUpdate'
          description: ''
    delete:
      operationId: api_appartements_destroy
      description: ViewSet pour gérer les appartements
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/appartements/{slug}/check_disponibilite/:
    post:
      operationId: api_appartements_check_disponibilite_create
      description: Vérifier la disponibilité pour des dates
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppartementDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AppartementDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AppartementDetail'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppartementDetail'
          description: ''
  /api/appartements/{slug}/locations/:
    get:
      operationId: api_appartements_locations_retrieve
      description: Locations d'un appartement
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppartementDetail'
          description: ''
  /api/appartements/{slug}/upload_photo/:
    post:
      operationId: api_appartements_upload_photo_create
      description: Uploader une photo supplémentaire
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppartementDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AppartementDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AppartementDetail'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppartementDetail'
          description: ''
  /api/auth/change-password/:
    post:
      operationId: api_auth_change_password_create
      description: Changer le mot de passe
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePassword'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePassword'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePassword'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangePassword'
          description: ''
  /api/auth/login/:
    post:
      operationId: api_auth_login_create
      description: Connexion utilisateur
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserLogin'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserLogin'
        required: true
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLogin'
          description: ''
  /api/auth/logout/:
    post:
      operationId: api_auth_logout_create
      description: Déconnexion
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Logout'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Logout'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Logout'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Logout'
          description: ''
  /api/auth/profile/:
    get:
      operationId: api_auth_profile_retrieve
      description: Gestion du profil utilisateur
      tags:
      - api
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserUpdate'
          description: ''
    put:
      operationId: api_auth_profile_update
      description: Gestion du profil utilisateur
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserUpdate'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserUpdate'
          description: ''
  /api/auth/register/:
    post:
      operationId: api_auth_register_create
      description: Inscription d'un nouvel utilisateur
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistration'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegistration'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegistration'
        required: true
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegistration'
          description: ''
  /api/auth/token/refresh/:
    post:
      operationId: api_auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/dashboard/locataire/:
    get:
      operationId: api_dashboard_locataire_retrieve
      description: Dashboard pour les locataires
      tags:
      - api
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/dashboard/proprietaire/:
    get:
      operationId: api_dashboard_proprietaire_retrieve
      description: Dashboard pour les propriétaires
      tags:
      - api
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/favoris/:
    get:
      operationId: api_favoris_retrieve
      description: Liste des favoris
      tags:
      - api
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriCreate'
          description: ''
    post:
      operationId: api_favoris_create
      description: Ajouter/retirer un favori
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FavoriCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/FavoriCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FavoriCreate'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriCreate'
          description: ''
  /api/locations/:
    get:
      operationId: api_locations_retrieve
      description: ViewSet pour gérer les locations
      tags:
      - api
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: api_locations_create
      description: ViewSet pour gérer les locations
      tags:
      - api
      security:
      - cookieAuth: []
      responses:
        '201':
          description: No response body
  /api/locations/{id}/:
    get:
      operationId: api_locations_retrieve_2
      description: ViewSet pour gérer les locations
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Location.
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
    put:
      operationId: api_locations_update
      description: ViewSet pour gérer les locations
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Location.
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
    patch:
      operationId: api_locations_partial_update
      description: ViewSet pour gérer les locations
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Location.
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
    delete:
      operationId: api_locations_destroy
      description: ViewSet pour gérer les locations
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Location.
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/locations/{id}/annuler/:
    post:
      operationId: api_locations_annuler_create
      description: Annuler une location
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Location.
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/locations/{id}/confirmer/:
    post:
      operationId: api_locations_confirmer_create
      description: Confirmer une location (admin ou propriétaire de l'appartement)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Location.
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/locations/a_venir/:
    get:
      operationId: api_locations_a_venir_retrieve
      description: Locations à venir
      tags:
      - api
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/locations/actives/:
    get:
      operationId: api_locations_actives_retrieve
      description: Locations actives
      tags:
      - api
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/statistiques/:
    get:
      operationId: api_statistiques_retrieve
      description: Statistiques globales (admin uniquement)
      tags:
      - api
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
components:
  schemas:
    ActionEnum:
      enum:
      - add
      - remove
      type: string
      description: |-
        * `add` - add
        * `remove` - remove
    AppartementCreateUpdate:
      type: object
      description: Sérialiseur pour créer/modifier un appartement
      properties:
        titre:
          type: string
          description: Titre de l'annonce
          maxLength: 200
        description:
          type: string
          description: Description détaillée
        adresse:
          type: string
          title: Adresse complète
          maxLength: 300
        ville:
          type: string
          maxLength: 100
        code_postal:
          type: string
          maxLength: 10
        loyer_mensuel:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          title: Loyer mensuel (CFA)
        caution:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        surface:
          type: integer
          maximum: 1000
          minimum: 1
          nullable: true
          title: Surface (m²)
        nb_pieces:
          type: integer
          maximum: 2147483647
          minimum: 1
          title: Nombre de pièces
        disponible:
          type: boolean
        photo_principale:
          type: string
          format: uri
          nullable: true
        proprietaire:
          type: string
          format: uuid
          nullable: true
          title: Propriétaire
      required:
      - adresse
      - description
      - loyer_mensuel
      - titre
    AppartementDetail:
      type: object
      description: Sérialiseur pour le détail d'un appartement
      properties:
        id:
          type: integer
          readOnly: true
        slug:
          type: string
          nullable: true
          maxLength: 255
          pattern: ^[-a-zA-Z0-9_]+$
        titre:
          type: string
          description: Titre de l'annonce
          maxLength: 200
        description:
          type: string
          description: Description détaillée
        adresse:
          type: string
          title: Adresse complète
          maxLength: 300
        ville:
          type: string
          maxLength: 100
        code_postal:
          type: string
          maxLength: 10
        loyer_mensuel:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          title: Loyer mensuel (CFA)
        caution:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        surface:
          type: integer
          maximum: 1000
          minimum: 1
          nullable: true
          title: Surface (m²)
        nb_pieces:
          type: integer
          maximum: 2147483647
          minimum: 1
          title: Nombre de pièces
        disponible:
          type: boolean
        photo_principale:
          type: string
          format: uri
          nullable: true
        photo_principale_url:
          type: string
          nullable: true
          readOnly: true
        photos:
          type: array
          items:
            $ref: '#/components/schemas/Photo'
          readOnly: true
        nb_vues:
          type: integer
          readOnly: true
          title: Nombre de vues
        nb_favoris:
          type: integer
          readOnly: true
          title: Nombre de favoris
        date_creation:
          type: string
          format: date-time
          readOnly: true
          title: Date de création
        date_modification:
          type: string
          format: date-time
          readOnly: true
          title: Dernière modification
      required:
      - adresse
      - date_creation
      - date_modification
      - description
      - id
      - loyer_mensuel
      - nb_favoris
      - nb_vues
      - photo_principale_url
      - photos
      - titre
    AppartementList:
      type: object
      description: Sérialiseur pour la liste des appartements (version simplifiée)
      properties:
        id:
          type: integer
          readOnly: true
        slug:
          type: string
          nullable: true
          maxLength: 255
          pattern: ^[-a-zA-Z0-9_]+$
        titre:
          type: string
          description: Titre de l'annonce
          maxLength: 200
        ville:
          type: string
          maxLength: 100
        loyer_mensuel:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          title: Loyer mensuel (CFA)
        surface:
          type: integer
          maximum: 1000
          minimum: 1
          nullable: true
          title: Surface (m²)
        nb_pieces:
          type: integer
          maximum: 2147483647
          minimum: 1
          title: Nombre de pièces
        disponible:
          type: boolean
        photo_principale_url:
          type: string
          nullable: true
          readOnly: true
        nb_vues:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          title: Nombre de vues
        nb_favoris:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          title: Nombre de favoris
      required:
      - id
      - loyer_mensuel
      - photo_principale_url
      - titre
    ChangePassword:
      type: object
      description: Sérialiseur pour changer le mot de passe
      properties:
        old_password:
          type: string
          writeOnly: true
        new_password:
          type: string
          writeOnly: true
      required:
      - new_password
      - old_password
    FavoriCreate:
      type: object
      description: Sérialiseur pour ajouter/retirer un favori
      properties:
        appartement_id:
          type: integer
        action:
          $ref: '#/components/schemas/ActionEnum'
      required:
      - action
      - appartement_id
    Logout:
      type: object
      description: Sérialiseur pour la déconnexion
      properties:
        refresh_token:
          type: string
      required:
      - refresh_token
    PaginatedAppartementListList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/AppartementList'
    PatchedAppartementCreateUpdate:
      type: object
      description: Sérialiseur pour créer/modifier un appartement
      properties:
        titre:
          type: string
          description: Titre de l'annonce
          maxLength: 200
        description:
          type: string
          description: Description détaillée
        adresse:
          type: string
          title: Adresse complète
          maxLength: 300
        ville:
          type: string
          maxLength: 100
        code_postal:
          type: string
          maxLength: 10
        loyer_mensuel:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          title: Loyer mensuel (CFA)
        caution:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        surface:
          type: integer
          maximum: 1000
          minimum: 1
          nullable: true
          title: Surface (m²)
        nb_pieces:
          type: integer
          maximum: 2147483647
          minimum: 1
          title: Nombre de pièces
        disponible:
          type: boolean
        photo_principale:
          type: string
          format: uri
          nullable: true
        proprietaire:
          type: string
          format: uuid
          nullable: true
          title: Propriétaire
    Photo:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        image:
          type: string
          format: uri
          title: Photo
        legende:
          type: string
          title: Légende
          maxLength: 200
      required:
      - id
      - image
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    UserLogin:
      type: object
      description: Sérialiseur pour la connexion des utilisateurs
      properties:
        email:
          type: string
          format: email
        password:
